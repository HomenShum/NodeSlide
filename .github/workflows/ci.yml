name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App — lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint (biome)
        run: npx biome check src shared
      - name: Typecheck (tsc)
        run: npx tsc -b
      - name: Test (vitest)
        run: npx vitest run
      - name: Production build (vite)
        run: npx vite build

  mcp:
    name: MCP — typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
