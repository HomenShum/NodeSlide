name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App + packages — lint · typecheck · test · build · consume
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint (biome)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm test
      - name: Production build (packages + app)
        run: npm run build
        env:
          # CI placeholder backend binding — the smoke gate accepts either the
          # landing page or the deployment-guard screen (see scripts/smoke.mjs).
          VITE_CONVEX_URL: https://ci-placeholder.convex.cloud
          VITE_CONVEX_SITE_URL: https://ci-placeholder.convex.site
      - name: Packed package consumer smoke
        run: npm run packages:consumer:smoke
      - name: Packed external agent + MCP smoke
        run: npm run proof:external-agent
      - name: Install Playwright Chromium (smoke)
        run: npx playwright install --with-deps chromium
      - name: Runtime smoke (serve dist, assert React mounts, zero page errors)
        run: node scripts/smoke.mjs

  mcp:
    name: MCP — typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  noderoom-consumer:
    name: NodeRoom / NodeAgent packed consumer
    needs: app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout candidate NodeSlide
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: nodeslide
      - name: Checkout NodeRoom consumer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: HomenShum/NodeRoom
          ref: main
          path: noderoom
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            nodeslide/package-lock.json
            noderoom/package-lock.json
      - name: Install producer dependencies
        run: npm ci --prefix nodeslide
      - name: Build and prove publish-shaped NodeSlide packages
        working-directory: nodeslide
        run: |
          npm run packages:build
          npm run packages:consumer:smoke
          npm run proof:node-gym-portability -- --noderoom-root ../noderoom
          mkdir -p "$RUNNER_TEMP/nodeslide-packages"
          mkdir -p "$RUNNER_TEMP/node-gym-packages"
          npm pack --workspace @nodekit/gym-core --pack-destination "$RUNNER_TEMP/node-gym-packages"
          npm pack --workspace @nodeslide/contracts --pack-destination "$RUNNER_TEMP/nodeslide-packages"
          npm pack --workspace @nodeslide/engine --pack-destination "$RUNNER_TEMP/nodeslide-packages"
          npm pack --workspace @nodeslide/backend --pack-destination "$RUNNER_TEMP/nodeslide-packages"
          npm pack --workspace @nodeslide/testing --pack-destination "$RUNNER_TEMP/nodeslide-packages"
      - name: Stage the exact candidate Gym tarball in NodeRoom
        working-directory: noderoom
        shell: bash
        run: |
          gym_tarballs=("$RUNNER_TEMP"/node-gym-packages/nodekit-gym-core-*.tgz)
          if [ "${#gym_tarballs[@]}" -ne 1 ] || [ ! -f "${gym_tarballs[0]}" ]; then
            echo "Expected exactly one packed @nodekit/gym-core candidate." >&2
            exit 1
          fi
          node scripts/stage-node-gym-candidate.mjs \
            --tarball "${gym_tarballs[0]}" \
            --producer-package-json ../nodeslide/packages/gym-core/package.json \
            --json-out "$RUNNER_TEMP/node-gym-candidate-stage.json"
          npm ci --ignore-scripts
      - name: Verify NodeRoom's exact Gym lock and direct consumer journey
        working-directory: noderoom
        run: npm run nodegym:consumer:proof
      - name: Run NodeRoom's canonical NodeSlide / NodeAgent journey
        working-directory: noderoom
        env:
          NODESLIDE_PACKAGE_ARTIFACT: ${{ runner.temp }}/nodeslide-packages
        run: npm run nodeslide:consumer:proof
