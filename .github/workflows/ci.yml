name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App + packages — lint · typecheck · test · build · consume
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint (biome)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm test
      - name: Production build (packages + app)
        run: npm run build
        env:
          # CI placeholder backend binding — the smoke gate accepts either the
          # landing page or the deployment-guard screen (see scripts/smoke.mjs).
          VITE_CONVEX_URL: https://ci-placeholder.convex.cloud
          VITE_CONVEX_SITE_URL: https://ci-placeholder.convex.site
      - name: Packed package consumer smoke
        run: npm run packages:consumer:smoke
      - name: Packed external agent + MCP smoke
        run: npm run proof:external-agent
      - name: Install Playwright Chromium (smoke)
        run: npx playwright install --with-deps chromium
      - name: Runtime smoke (serve dist, assert React mounts, zero page errors)
        run: node scripts/smoke.mjs

  mcp:
    name: MCP — typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  noderoom-consumer:
    name: NodeRoom / NodeAgent packed consumer
    needs: app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout candidate NodeSlide
        uses: actions/checkout@v4
        with:
          path: nodeslide
      - name: Checkout NodeRoom consumer
        uses: actions/checkout@v4
        with:
          repository: HomenShum/NodeRoom
          ref: main
          path: noderoom
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            nodeslide/package-lock.json
            noderoom/package-lock.json
      - name: Install producer and consumer dependencies
        run: |
          npm ci --prefix nodeslide
          npm ci --prefix noderoom
      - name: Build and prove publish-shaped NodeSlide packages
        working-directory: nodeslide
        run: |
          npm run packages:build
          npm run packages:consumer:smoke
          mkdir -p "$RUNNER_TEMP/nodeslide-packages"
          npm pack --workspace @nodeslide/contracts --pack-destination "$RUNNER_TEMP/nodeslide-packages"
          npm pack --workspace @nodeslide/engine --pack-destination "$RUNNER_TEMP/nodeslide-packages"
          npm pack --workspace @nodeslide/backend --pack-destination "$RUNNER_TEMP/nodeslide-packages"
          npm pack --workspace @nodeslide/testing --pack-destination "$RUNNER_TEMP/nodeslide-packages"
      - name: Run NodeRoom's canonical NodeAgent journey
        working-directory: noderoom
        env:
          NODESLIDE_PACKAGE_ARTIFACT: ${{ runner.temp }}/nodeslide-packages
        run: npm run nodeslide:consumer:proof
