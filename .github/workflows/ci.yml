name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App + packages — lint · typecheck · test · build · consume
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint (biome)
        run: npx biome check src shared packages scripts/package-consumer-smoke.mjs
      - name: Typecheck (tsc)
        run: npx tsc -b
      - name: Test (vitest)
        run: npx vitest run
      - name: Production build (packages + app)
        run: npm run build
        env:
          # CI placeholder backend binding — the smoke gate accepts either the
          # landing page or the deployment-guard screen (see scripts/smoke.mjs).
          VITE_CONVEX_URL: https://ci-placeholder.convex.cloud
          VITE_CONVEX_SITE_URL: https://ci-placeholder.convex.site
      - name: Packed package consumer smoke
        run: npm run packages:consumer:smoke
      - name: Install Playwright Chromium (smoke)
        run: npx playwright install --with-deps chromium
      - name: Runtime smoke (serve dist, assert React mounts, zero page errors)
        run: node scripts/smoke.mjs

  mcp:
    name: MCP — typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build external-agent dependency
        run: npm run build --workspace @nodeslide/external-agent
      - run: npm run typecheck --workspace nodeslide-mcp
      - run: npm test --workspace nodeslide-mcp
      - run: npm run build --workspace nodeslide-mcp
