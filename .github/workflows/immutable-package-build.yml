name: Build reproducible package release candidate

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Exact green commit SHA to build
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate exact release ref
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
        run: '[[ "$RELEASE_REF" =~ ^[0-9a-f]{40}$ ]]'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.release_ref }}
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          package-manager-cache: false
      - run: npm ci
      - name: Build the publish-shaped package set
        shell: bash
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
        run: |
          [[ "$(git rev-parse HEAD)" == "$RELEASE_REF" ]]
          release_version="$(node -e "process.stdout.write(require('./packages/contracts/package.json').version)")"
          [[ "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          npm run artifacts:build -- \
            --out artifacts/release \
            --release-id "$RELEASE_REF" \
            --release-version "$release_version"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nodeslide-package-set
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 7
